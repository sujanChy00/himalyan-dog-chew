services:
  db:
    image: postgres:latest
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sierrajapan
    volumes:
      - db-data:/var/lib/postgresql/data

  admin:
    image: adminer
    restart: always
    ports:
      - 9999:8080

volumes:
  db-data:
    driver: local
